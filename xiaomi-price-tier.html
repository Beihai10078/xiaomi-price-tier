<style>
:root {
  --bg: #1C1B1F;
  --surface: #25232A;
  --surface2: #2E2C35;
  --surface3: #383640;
  --primary: #6750A4;
  --primary-container: #4A3D6B;
  --on-bg: #E6E1E5;
  --on-bg-dim: #CAC4D0;
  --on-surface: #E6E1E5;
  --on-surface-dim: #CAC4D0;
  --outline: #938F99;
  --outline-variant: #49454F;
  --brand-xiaomi: #FF6900;
  --brand-redmi: #E62E2E;
  --brand-poco: #FFD700;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 200ms cubic-bezier(0.2,0,0,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--on-bg);
  min-height: 100vh;
  font-size: 16px;
}
.container { max-width:1200px; margin:0 auto; padding:24px 20px 48px; }

/* Header */
header {
  text-align: center;
  padding: 48px 0 32px;
}
header h1 {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #FF6900, #FFD700, #E62E2E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p.sub {
  color: var(--on-bg-dim);
  font-size: 16px;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-bottom: 32px;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--outline-variant);
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  text-align: center;
  min-width: 100px;
}
.stat-chip .num {
  display: block;
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--brand-xiaomi), var(--brand-redmi));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-chip .label {
  font-size: 12px;
  color: var(--on-bg-dim);
  margin-top: 4px;
}

/* Filters */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}
.filter-chip {
  padding: 8px 18px;
  border: 1px solid var(--outline-variant);
  border-radius: 20px;
  background: var(--surface);
  color: var(--on-bg-dim);
  cursor: pointer;
  font-size: 14px;
  transition: all var(--transition);
  user-select: none;
}
.filter-chip:hover {
  background: var(--surface2);
  color: var(--on-bg);
}
.filter-chip.active {
  background: var(--primary-container);
  border-color: var(--primary);
  color: #EADDFF;
}
.filter-chip.xiaomi-active {
  background: rgba(255,105,0,0.2);
  border-color: var(--brand-xiaomi);
  color: var(--brand-xiaomi);
}
.filter-chip.redmi-active {
  background: rgba(230,46,46,0.2);
  border-color: var(--brand-redmi);
  color: var(--brand-redmi);
}
.filter-chip.poco-active {
  background: rgba(255,215,0,0.15);
  border-color: var(--brand-poco);
  color: var(--brand-poco);
}

/* Filter label */
.filter-section {
  text-align: center;
  margin-bottom: 12px;
}
.filter-label {
  font-size: 12px;
  color: var(--on-bg-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Result count */
.result-count {
  text-align: center;
  color: var(--on-bg-dim);
  font-size: 14px;
  margin-bottom: 24px;
}

/* Tier Section */
.tier-section {
  margin-bottom: 32px;
}
.tier-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 0 4px;
}
.tier-badge {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  flex-shrink: 0;
}
.tier-info h3 {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}
.tier-info span {
  font-size: 13px;
  color: var(--on-bg-dim);
}
.tier-count {
  margin-left: auto;
  font-size: 13px;
  color: var(--on-bg-dim);
}

/* Device Grid */
.device-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.device-card {
  background: var(--surface);
  border: 1px solid var(--outline-variant);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.device-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.device-card .name {
  font-size: 14px;
  font-weight: 600;
  color: var(--on-bg);
  line-height: 1.3;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.device-card .codename {
  font-size: 12px;
  color: var(--on-bg-dim);
  font-family: 'Consolas', 'SF Mono', 'Cascadia Code', monospace;
  margin-bottom: 6px;
}
.device-card .soc {
  font-size: 11px;
  color: var(--outline);
  margin-bottom: 4px;
  font-family: 'Consolas', 'SF Mono', 'Cascadia Code', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.device-card .price {
  font-size: 18px;
  font-weight: 700;
}
.device-card .date {
  font-size: 11px;
  color: var(--outline);
  margin-top: 4px;
}
.device-card .brand-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.dot-xiaomi { background: var(--brand-xiaomi); }
.dot-redmi { background: var(--brand-redmi); }
.dot-poco { background: var(--brand-poco); }

/* Tier colors on cards */
.device-card.tier-0 { border-left: 3px solid #4CAF50; }
.device-card.tier-1 { border-left: 3px solid #00BCD4; }
.device-card.tier-2 { border-left: 3px solid #2196F3; }
.device-card.tier-3 { border-left: 3px solid #9C27B0; }
.device-card.tier-4 { border-left: 3px solid #FF9800; }
.device-card.tier-5 { border-left: 3px solid #F44336; }
.device-card.tier-6 { border-left: 3px solid #FFD700; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface3);
  color: var(--on-bg);
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 14px;
  opacity: 0;
  transition: opacity var(--transition);
  pointer-events: none;
  z-index: 1000;
}
.toast.show {
  opacity: 1;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--on-bg-dim);
  display: none;
}
.empty-state svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* Footer */
footer {
  text-align: center;
  padding: 32px;
  color: var(--outline);
  font-size: 13px;
}
footer a {
  color: var(--primary);
  text-decoration: none;
}

/* Responsive */
@media (max-width: 640px) {
  header h1 { font-size: 28px; }
  .device-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .stat-chip { min-width: 70px; padding: 10px 14px; }
  .stat-chip .num { font-size: 20px; }
}
</style>

const TIERS = [
{"label": "入门级", "subtitle": "¥0 - 999", "color": "#4CAF50", "bg": "rgba(76,175,80,0.12)", "border": "rgba(76,175,80,0.35)", "lo": 0, "hi": 999, "count": 18},
{"label": "进阶级", "subtitle": "¥1,000 - 1,999", "color": "#00BCD4", "bg": "rgba(0,188,212,0.12)", "border": "rgba(0,188,212,0.35)", "lo": 1000, "hi": 1999, "count": 56},
{"label": "中端级", "subtitle": "¥2,000 - 2,999", "color": "#2196F3", "bg": "rgba(33,150,243,0.12)", "border": "rgba(33,150,243,0.35)", "lo": 2000, "hi": 2999, "count": 39},
{"label": "高端级", "subtitle": "¥3,000 - 3,999", "color": "#9C27B0", "bg": "rgba(156,39,176,0.12)", "border": "rgba(156,39,176,0.35)", "lo": 3000, "hi": 3999, "count": 28},
{"label": "旗舰级", "subtitle": "¥4,000 - 4,999", "color": "#FF9800", "bg": "rgba(255,152,0,0.12)", "border": "rgba(255,152,0,0.35)", "lo": 4000, "hi": 4999, "count": 13},
{"label": "至尊级", "subtitle": "¥5,000 - 6,999", "color": "#F44336", "bg": "rgba(244,67,54,0.12)", "border": "rgba(244,67,54,0.35)", "lo": 5000, "hi": 6999, "count": 11},
{"label": "典藏级", "subtitle": "¥7,000+", "color": "#FFD700", "bg": "rgba(255,215,0,0.10)", "border": "rgba(255,215,0,0.35)", "lo": 7000, "hi": 99999, "count": 4}
];

// ─── 当前筛选状态 ───
let currentBrand = 'all';
let currentType = 'all';

// ─── 初始化 ───
function init() {
  renderAll();
}

// ─── 获取设备所属 tier index ───
function getTierIndex(price) {
  if (price === null || price === undefined) return -1;
  if (price <= 999) return 0;
  if (price <= 1999) return 1;
  if (price <= 2999) return 2;
  if (price <= 3999) return 3;
  if (price <= 4999) return 4;
  if (price <= 6999) return 5;
  return 6;
}

// ─── 格式化价格 ───
function formatPrice(p) {
  if (p === null || p === undefined) return '暂无';
  return '¥' + p.toLocaleString();
}

// ─── 品牌名映射 ───
const brandNames = { xiaomi: '小米', redmi: '红米', poco: 'POCO' };
const typeNames = { phone: '手机', tablet: '平板', fold: '折叠屏' };

// ─── 渲染全部 ───
function renderAll() {
  let filtered = DEVICES;

  if (currentBrand !== 'all') {
    filtered = filtered.filter(d => d.b === currentBrand);
  }
  if (currentType !== 'all') {
    filtered = filtered.filter(d => d.t === currentType);
  }

  // Group by tier
  const grouped = {};
  let unpriced = [];
  filtered.forEach(d => {
    const ti = getTierIndex(d.p);
    if (ti === -1) { unpriced.push(d); return; }
    if (!grouped[ti]) grouped[ti] = [];
    grouped[ti].push(d);
  });

  let html = '';
  let visibleCount = 0;

  // Render unpriced devices first
  if (unpriced.length > 0) {
    visibleCount += unpriced.length;
    html += '<div class="tier-section">';
    html += '<div class="tier-header">';
    html += '<div class="tier-badge" style="background:rgba(147,143,153,0.5);color:#fff">~</div>';
    html += '<div class="tier-info"><h3 style="color:#938F99">待定价</h3><span>暂无首发价格</span></div>';
    html += '<div class="tier-count">' + unpriced.length + ' 台</div>';
    html += '</div>';
    html += '<div class="device-grid">';
    unpriced.forEach(d => {
      html += '<div class="device-card tier--1" onclick="copyCodename(\'' + d.c + '\')" title="点击复制代号">';
      html += '<div class="brand-dot dot-' + d.b + '"></div>';
      html += '<div class="name">' + escapeHtml(d.n) + '</div>';
      html += '<div class="codename">' + d.c + '</div>';
      if (d.s) html += '<div class="soc">' + d.s + '</div>';
      html += '<div class="price" style="color:#938F99">' + formatPrice(d.p) + '</div>';
      html += '<div class="date">' + d.d + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  TIERS.forEach((tier, ti) => {
    const devs = grouped[ti] || [];
    if (devs.length === 0) return;
    visibleCount += devs.length;

    html += '<div class="tier-section">';
    html += '<div class="tier-header">';
    html += '<div class="tier-badge" style="background:' + tier.border + ';color:#fff">' + (ti + 1) + '</div>';
    html += '<div class="tier-info"><h3 style="color:' + tier.color + '">' + tier.label + '</h3><span>' + tier.subtitle + '</span></div>';
    html += '<div class="tier-count">' + devs.length + ' 台</div>';
    html += '</div>';
    html += '<div class="device-grid">';

    devs.forEach(d => {
      html += '<div class="device-card tier-' + ti + '" onclick="copyCodename(\'' + d.c + '\')" title="点击复制代号">';
      html += '<div class="brand-dot dot-' + d.b + '"></div>';
      html += '<div class="name">' + escapeHtml(d.n) + '</div>';
      html += '<div class="codename">' + d.c + '</div>';
      if (d.s) html += '<div class="soc">' + d.s + '</div>';
      html += '<div class="price" style="color:' + tier.color + '">' + formatPrice(d.p) + '</div>';
      html += '<div class="date">' + d.d + '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('tierContainer').innerHTML = html;
  document.getElementById('resultCount').textContent = '显示 ' + visibleCount + ' 台设备';
  document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';

  // Update stats
  updateStats(filtered);
}

function updateStats(filtered) {
  const stats = document.querySelectorAll('.stats-bar .stat-chip');
  stats[1].querySelector('.num').textContent = filtered.length;
  const prices = filtered.map(d => d.p).filter(p => p !== null).sort((a,b) => a-b);
  if (prices.length > 0) {
    stats[2].querySelector('.num').textContent = formatPrice(prices[0]);
    stats[3].querySelector('.num').textContent = formatPrice(prices[prices.length-1]);
    stats[4].querySelector('.num').textContent = formatPrice(prices[Math.floor(prices.length/2)]);
  } else {
    stats[2].querySelector('.num').textContent = '-';
    stats[3].querySelector('.num').textContent = '-';
    stats[4].querySelector('.num').textContent = '-';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function copyCodename(code) {
  navigator.clipboard.writeText(code).then(() => {
    showToast('已复制: ' + code);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ─── 筛选事件 ───
document.getElementById('brandBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-chip')) {
    currentBrand = e.target.dataset.filter;
    const chips = this.querySelectorAll('.filter-chip');
    chips.forEach(c => {
      c.classList.remove('active', 'xiaomi-active', 'redmi-active', 'poco-active');
      if (c.dataset.filter === currentBrand) {
        if (currentBrand === 'all') c.classList.add('active');
        else c.classList.add(currentBrand + '-active');
      }
    });
    renderAll();
  }
});

document.getElementById('typeBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-chip')) {
    currentType = e.target.dataset.filter;
    const chips = this.querySelectorAll('.filter-chip');
    chips.forEach(c => {
      c.classList.toggle('active', c.dataset.filter === currentType);
    });
    renderAll();
  }
});

init();
</script>
